name: sk-movies deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Caches node_modules keyed on the lockfile hash, so a push that doesn't touch dependencies
      # skips `npm ci` entirely. Works out of the box on GitHub-hosted runners (actions/cache uses
      # GitHub's own cache storage) — nothing to configure, unlike a self-hosted-runner setup where
      # you'd need to stand up your own cache backend (registry, secrets, etc).
      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Only runs on a cache miss (i.e. package-lock.json changed since the last successful run).
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy main build to gh-pages root
        run: |
          git config --global user.name '${{ github.actor }}'
          git config --global user.email '${{ github.actor }}@users.noreply.github.com'

          git clone --branch gh-pages --single-branch \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} \
            gh-pages-branch

          # Remove everything except staging-pr-* folders and .git
          for item in gh-pages-branch/*; do
            basename=$(basename "$item")
            if [[ "$basename" != staging-pr-* ]]; then
              rm -rf "$item"
            fi
          done

          cp -r build/. gh-pages-branch/

          cd gh-pages-branch
          git add .
          git commit -m "Deploy main to gh-pages" && \
            git push || echo "Nothing to commit"
