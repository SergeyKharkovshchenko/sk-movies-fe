name: Release
on:
  workflow_dispatch:
    inputs:
      version_action:
        description: "Version action to perform"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: "Custom version (if version_action is custom)"
        required: false
        type: string
env:
  TERM: xterm-256color
jobs:
  release:
    runs-on: kaeser--product-navigator-dashboard--dev--runner
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get current version
        id: get-version
        run: |
          chmod +x ./semver.sh
          CURRENT_VERSION=$(./semver.sh output)
          echo "Current version: $CURRENT_VERSION"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV

      - name: Determine version bump type
        id: bump-type
        run: |
          if [[ "${{ inputs.version_action }}" == "custom" ]]; then
            if [[ -z "${{ inputs.custom_version }}" ]]; then
              echo "Error: Custom version is required when version_action is 'custom'"
              exit 1
            fi
            echo "Using CUSTOM version: ${{ inputs.custom_version }}"
            echo "BUMP_TYPE=custom" >> $GITHUB_ENV
            echo "CUSTOM_VERSION=${{ inputs.custom_version }}" >> $GITHUB_ENV
          else
            echo "Using manually selected bump type: ${{ inputs.version_action }}"
            echo "BUMP_TYPE=${{ inputs.version_action }}" >> $GITHUB_ENV
          fi

      - name: Set up SSH deploy key
        run: |
          # Create the SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Add the SSH key
          echo "${{ secrets.DEPLOY_KEY_PRIVATE }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Create SSH config file to specify the custom port
          cat > ~/.ssh/config << EOF
          Host git.pantopix.net
            Port 3300
            IdentityFile ~/.ssh/id_ed25519
            User git
            IdentitiesOnly yes
            PreferredAuthentications publickey
          EOF
          chmod 600 ~/.ssh/config

          # Set up SSH directory and known hosts
          ssh-keyscan -p 3300 -t rsa git.pantopix.net >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Set Git identity for version control
        run: |
          # Set Git to use SSH
          git config --global user.name "Andrei Milas"
          git config --global user.email "andrei.milas@pantopix.com"

          # Change remote URL from HTTPS to SSH
          git remote set-url origin git@git.pantopix.net:PANTOPIX/pxpim-ui.git

          # Test SSH connection
          git ls-remote origin > /dev/null && echo "SSH authentication - OK" || echo "SSH authentication - FAIL"

      - name: Update version
        run: |
          chmod +x ./semver.sh
          echo "Bumping version ($BUMP_TYPE)"
          if [[ "$BUMP_TYPE" == "custom" ]]; then
            ./semver.sh set-version $CUSTOM_VERSION
          else
            ./semver.sh bump $BUMP_TYPE
          fi
