name: Pull Request (main branch)
on:
  pull_request:
    branches: ["main"]
jobs:
  pull-request:
    runs-on: kaeser--product-navigator-dashboard--dev--runner
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "npm"

      - name: Gather common variables
        id: gather-var
        run: |
          echo "COMMIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "VITE_COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_TIME=$(git log -1 --format=%cd)" >> $GITHUB_ENV
          echo "COMMIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | tee /etc/apt/sources.list.d/google-chrome.list
          apt-get update
          apt-get install -y google-chrome-stable

      - name: Install Cypress dependencies
        run: |
          apt-get update
          apt-get install -y \
            xvfb \
            libgtk2.0-0 \
            libgtk-3-0 \
            libgbm-dev \
            libnotify-dev \
            libgconf-2-4 \
            libnss3 \
            libxss1 \
            libasound2 \
            libxtst6 \
            xauth

      - name: Install dependencies
        run: npm ci

      - name: Run lint, format, and svelte-check
        run: npm run verify

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Build project for development
        env:
          VITE_API_URL: "https://product-navigator-api-dev.cfapps.eu10.hana.ondemand.com"
          VITE_API_RDF_MANAGER_URL: "https://rdf-manager-dev.cfapps.eu10.hana.ondemand.com"
        run: npm run build:dev

      - name: Cypress run
        uses: cypress-io/github-action@v6
        env:
          DEBUG: "@cypress/github-action"
          DISABLE_STRUCTURED_LOGGING: "true"
          CYPRESS_clientId: ${{ secrets.SERVICE_TOKEN_CLIENTID }}
          CYPRESS_clientSecret: ${{ secrets.SERVICE_TOKEN_CLIENTSECRET }}
          CYPRESS_apiUrl: "https://product-navigator-api-dev.cfapps.eu10.hana.ondemand.com"
          CYPRESS_oauthUrl: "https://kaeserd.authentication.eu10.hana.ondemand.com/oauth/token"
        with:
          install: false
          headed: false
          start: npm run preview
          wait-on: "http://0.0.0.0:5173"
          wait-on-timeout: 10
          browser: chrome

      - name: Fetch main branch for comparison
        run: |
          # Ensure we have the latest main branch for proper comparison
          git fetch origin main:refs/remotes/origin/main --force
          # Verify we have the branch
          git branch -a | grep origin/main

      - name: Check code quality
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
        run: |
          export SONAR_SCANNER_VERSION=7.0.2.4839
          export SONAR_SCANNER_HOME=$HOME/.sonar/sonar-scanner-$SONAR_SCANNER_VERSION-linux-x64
          curl --create-dirs -sSLo $HOME/.sonar/sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$SONAR_SCANNER_VERSION-linux-x64.zip
          unzip -o $HOME/.sonar/sonar-scanner.zip -d $HOME/.sonar/
          export PATH=$SONAR_SCANNER_HOME/bin:$PATH
          sonar-scanner \
            -Dsonar.projectKey=${{ secrets.SONARQUBE_PROJECT_KEY }} \
            -Dsonar.sources=. \
            -Dsonar.host.url=${{ secrets.SONARQUBE_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONARQUBE_TOKEN }} \
            -Dsonar.pullrequest.key="${{ gitea.event.pull_request.number }}" \
            -Dsonar.pullrequest.branch="${{ gitea.event.pull_request.head.ref }}" \
            -Dsonar.pullrequest.base="${{ gitea.event.pull_request.base.ref }}" \
            -Dsonar.scm.provider=git \
            -Dsonar.javascript.lcov.reportPaths=./coverage/lcov.info \
            -Dsonar.qualitygate.wait=true
